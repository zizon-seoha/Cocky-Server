spring:
  application:
    name: Cocky-Server

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3308/cocky?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:cocky}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret-key: ${JWT_SECRET_KEY:local-dev-only-jwt-secret-key-please-change-in-production-0000000000}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:1209600000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    timeout-ms: 60000
  models:
    generation: ${OPENAI_MODEL_GENERATION:gpt-5.4-mini}
    instant-feedback: ${OPENAI_MODEL_INSTANT_FEEDBACK:gpt-5.4-nano}
    round-feedback: ${OPENAI_MODEL_ROUND_FEEDBACK:gpt-5.4-nano}
    weekly-feedback: ${OPENAI_MODEL_WEEKLY_FEEDBACK:gpt-5.4-mini}
    monthly-feedback: ${OPENAI_MODEL_MONTHLY_FEEDBACK:gpt-5.4-mini}
  executor: ${AI_EXECUTOR:local}
  exec:
    timeout-ms: 5000
  generation:
    max-retries: 3
    similarity-threshold: 0.80